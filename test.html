<!DOCTYPE html>
<html>
<head>
    <title>Test</title>
    <link rel="stylesheet" href="bootstrap.min.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons">
    <link rel="stylesheet" href="bootstrap-material-datetimepicker.css">
</head>
<body>
    <input type="text" id="date" class="form-control" placeholder="Date">

    <script src="moment-with-locales.min.js"></script>
    <script src="bootstrap.bundle.min.js"></script>
    <script>
        window._keydownListenersCount = 0;
        const originalAdd = window.addEventListener;
        const originalRemove = window.removeEventListener;

        window.addEventListener = function(type, listener, options) {
            if (type === 'keydown') {
                window._keydownListenersCount++;
                console.log('Added keydown listener. Total:', window._keydownListenersCount);
            }
            return originalAdd.call(this, type, listener, options);
        };

        window.removeEventListener = function(type, listener, options) {
            if (type === 'keydown') {
                window._keydownListenersCount--;
                console.log('Removed keydown listener. Total:', window._keydownListenersCount);
            }
            return originalRemove.call(this, type, listener, options);
        };
    </script>
    <script src="bootstrap-material-datetimepicker.js"></script>
    <script>
        var dtp = new BootstrapMaterialDatePicker(document.getElementById('date'), {
            time: false,
            clearButton: true
        });
    </script>
</body>
</html>
